<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon Unix | Staff Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="staffModal" class="fixed inset-0 z-[5000] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-6" style="display: none;">
        <div class="bg-white w-full max-w-2xl rounded-[3rem] p-10 shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-400 hover:text-red-500"><i class="fa-solid fa-xmark text-2xl"></i></button>
            <h3 id="modalTitle" class="text-3xl font-black mb-6">Staff Profile</h3>
            <form id="staffForm" class="grid grid-cols-2 gap-6">
                <input type="hidden" id="staffId">
                <div class="col-span-2 flex justify-center mb-4">
                    <div onclick="document.getElementById('staffImgInput').click()" class="w-32 h-32 bg-slate-100 rounded-[2rem] border-4 border-dashed border-slate-200 flex items-center justify-center cursor-pointer overflow-hidden relative">
                        <img id="staffPreview" class="hidden absolute inset-0 w-full h-full object-cover">
                        <i id="staffIcon" class="fa-solid fa-camera text-3xl text-slate-300"></i>
                    </div>
                    <input type="file" id="staffImgInput" class="hidden" accept="image/*" onchange="previewStaff(this)">
                </div>
                <input type="text" id="sName" placeholder="Full Name" class="w-full p-4 bg-slate-50 border rounded-xl font-bold" required>
                <input type="text" id="sRole" placeholder="Specialization (e.g. Senior Hair Stylist)" class="w-full p-4 bg-slate-50 border rounded-xl font-bold" required>
                <input type="tel" id="sPhone" placeholder="Mobile Number" class="w-full p-4 bg-slate-50 border rounded-xl font-bold" required>
                <select id="sStatus" class="w-full p-4 bg-slate-50 border rounded-xl font-bold">
                    <option value="Active">Active</option>
                    <option value="On Leave">On Leave</option>
                    <option value="Inactive">Inactive</option>
                </select>
                <button type="submit" class="col-span-2 bg-slate-900 text-white p-5 rounded-xl font-black shadow-xl hover:bg-indigo-600 transition uppercase tracking-widest">Save Specialist Profile</button>
            </form>
        </div>
    </div>

    <div class="flex flex-col md:flex-row min-h-screen">
        <aside class="w-full md:w-80 bg-white border-r p-6 sticky top-0 h-screen">
            <a href="admin.html" class="flex items-center gap-3 p-4 bg-slate-900 text-white rounded-2xl font-black mb-10"><i class="fa-solid fa-arrow-left"></i> Dashboard</a>
            <h2 class="text-2xl font-black text-slate-900 mb-8">Specialists</h2>
            <button onclick="openModal()" class="w-full p-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg hover:bg-indigo-500 transition"><i class="fa-solid fa-plus mr-2"></i> Add New Staff</button>
        </aside>

        <main class="flex-1 p-8 md:p-12 overflow-y-auto">
            <div id="staffGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Staff cards injected here -->
            </div>
        </main>
    </div>

    <script type="module">
        import { db, APP_CONFIG } from './config.js';
        import { collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let staffList = [];
        let base64Img = "";

        onSnapshot(collection(db, "staff"), snap => {
            staffList = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderStaff();
        });

        window.previewStaff = (input) => {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('staffPreview').src = e.target.result;
                document.getElementById('staffPreview').classList.remove('hidden');
                document.getElementById('staffIcon').classList.add('hidden');
                base64Img = e.target.result;
            };
            reader.readAsDataURL(file);
        };

        async function uploadImg(b64) {
            const fd = new FormData();
            fd.append("image", b64.split(',')[1]);
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${APP_CONFIG.imgbbKey}`, { method: 'POST', body: fd });
            const data = await res.json();
            return data.data.url;
        }

        document.getElementById('staffForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('staffId').value || doc(collection(db, "staff")).id;
            const btn = e.target.querySelector('button');
            btn.disabled = true; btn.innerText = "PROCESSING PROFILE...";

            let url = staffList.find(x => x.id === id)?.photo || "";
            if(base64Img && base64Img.startsWith('data:image')) {
                url = await uploadImg(base64Img);
            }

            const profile = {
                name: document.getElementById('sName').value,
                role: document.getElementById('sRole').value,
                phone: document.getElementById('sPhone').value,
                status: document.getElementById('sStatus').value,
                photo: url
            };

            await setDoc(doc(db, "staff", id), profile);
            closeModal();
            btn.disabled = false; btn.innerText = "Save Specialist Profile";
        };

        function renderStaff() {
            const grid = document.getElementById('staffGrid');
            grid.innerHTML = staffList.map(s => `
                <div class="bg-white rounded-[3rem] p-8 shadow-sm border group hover:shadow-2xl transition-all duration-500">
                    <div class="relative w-32 h-32 mx-auto mb-6">
                        <img src="${s.photo || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover rounded-[2rem] shadow-xl">
                        <div class="absolute -bottom-2 -right-2 w-8 h-8 rounded-full border-4 border-white ${s.status === 'Active' ? 'bg-emerald-500' : 'bg-rose-500'}"></div>
                    </div>
                    <div class="text-center">
                        <h4 class="text-xl font-black text-slate-900">${s.name}</h4>
                        <p class="text-[10px] font-black uppercase text-indigo-600 tracking-widest mt-1">${s.role}</p>
                        <div class="flex items-center justify-center gap-3 mt-6">
                            <button onclick="editStaff('${s.id}')" class="w-10 h-10 rounded-full bg-slate-100 text-slate-400 hover:bg-indigo-600 hover:text-white transition"><i class="fa-solid fa-pen"></i></button>
                            <button onclick="deleteStaff('${s.id}')" class="w-10 h-10 rounded-full bg-slate-100 text-slate-400 hover:bg-rose-600 hover:text-white transition"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.openModal = () => {
            document.getElementById('staffForm').reset();
            document.getElementById('staffId').value = '';
            document.getElementById('staffPreview').classList.add('hidden');
            document.getElementById('staffIcon').classList.remove('hidden');
            document.getElementById('staffModal').style.display = 'flex';
        };

        window.closeModal = () => document.getElementById('staffModal').style.display = 'none';

        window.editStaff = (id) => {
            const s = staffList.find(x => x.id === id);
            document.getElementById('staffId').value = s.id;
            document.getElementById('sName').value = s.name;
            document.getElementById('sRole').value = s.role;
            document.getElementById('sPhone').value = s.phone;
            document.getElementById('sStatus').value = s.status;
            if(s.photo) {
                document.getElementById('staffPreview').src = s.photo;
                document.getElementById('staffPreview').classList.remove('hidden');
                document.getElementById('staffIcon').classList.add('hidden');
            }
            document.getElementById('staffModal').style.display = 'flex';
        };

        window.deleteStaff = async (id) => {
            if(confirm("Permanently remove this staff member?")) await deleteDoc(doc(db, "staff", id));
        };
    </script>
</body>
</html>
