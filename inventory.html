<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon Unix | Enterprise Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="authGuard" class="fixed inset-0 z-[1100] bg-white flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <div class="flex flex-col md:flex-row min-h-screen" id="app" style="display:none;">
        <aside class="w-full md:w-80 bg-white border-r p-6 sticky top-0 h-screen overflow-y-auto">
            <h1 class="text-2xl font-black italic text-slate-900 mb-10">SALON <span class="text-indigo-600">UNIX</span></h1>
            <nav class="space-y-3">
                <a href="admin.html" class="flex items-center gap-3 p-4 bg-slate-900 text-white rounded-2xl font-black">
                    <i class="fa-solid fa-arrow-left"></i> DASHBOARD
                </a>
                <button onclick="openModal()" class="w-full flex items-center gap-3 p-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg">
                    <i class="fa-solid fa-plus"></i> ADD NEW ITEM
                </button>
            </nav>
        </aside>

        <main class="flex-grow p-6 md:p-12 overflow-y-auto">
            <h2 class="text-4xl font-black text-slate-900 mb-12">Stock <span class="text-indigo-600">Master</span></h2>
            <div class="bg-white rounded-[3rem] shadow-xl border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b text-[10px] font-black uppercase text-slate-400">
                        <tr><th class="p-10">Item Details</th><th>Pricing</th><th>Stock</th><th class="text-right p-10">Actions</th></tr>
                    </thead>
                    <tbody id="inventoryList" class="divide-y font-bold text-sm"></tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal for Add/Edit -->
    <div id="itemModal" class="fixed inset-0 z-[5000] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-6" style="display: none;">
        <div class="bg-white w-full max-w-3xl rounded-[3rem] p-10 shadow-2xl relative max-h-[90vh] overflow-y-auto">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-slate-400"><i class="fa-solid fa-xmark text-2xl"></i></button>
            <h3 id="modalTitle" class="text-3xl font-black mb-8">Manage Salon Asset</h3>
            
            <form id="itemForm" class="grid grid-cols-2 gap-6">
                <input type="hidden" id="editId">
                <div class="col-span-2 flex justify-center mb-4">
                    <div onclick="document.getElementById('itemImgInput').click()" class="w-40 h-40 bg-slate-100 rounded-[2.5rem] border-4 border-dashed border-slate-200 flex items-center justify-center cursor-pointer overflow-hidden relative">
                        <img id="itemPreview" class="hidden absolute inset-0 w-full h-full object-cover">
                        <i id="uploadIcon" class="fa-solid fa-cloud-arrow-up text-3xl text-slate-300"></i>
                    </div>
                    <input type="file" id="itemImgInput" class="hidden" accept="image/*" onchange="previewImage(this)">
                </div>

                <div class="col-span-2 md:col-span-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Item Name</label>
                    <input type="text" id="nameEn" class="w-full p-4 bg-slate-50 rounded-xl border outline-none font-bold" required>
                </div>
                <div class="col-span-2 md:col-span-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Category</label>
                    <select id="category" class="w-full p-4 bg-slate-50 rounded-xl border outline-none font-bold">
                        <option>Products</option><option>Hair Care</option><option>Skin Care</option><option>Facial</option><option>Bridal</option>
                    </select>
                </div>
                <div class="col-span-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Cost Price</label>
                    <input type="number" id="cost" class="w-full p-4 bg-slate-50 rounded-xl border outline-none font-bold" required>
                </div>
                <div class="col-span-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Initial Stock</label>
                    <input type="number" id="stock" class="w-full p-4 bg-slate-50 rounded-xl border outline-none font-bold" value="0">
                </div>
                <div class="col-span-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Variants (Format: Size:Price, e.g. 100ml:2500)</label>
                    <input type="text" id="variants" class="w-full p-4 bg-slate-50 rounded-xl border outline-none font-bold" placeholder="Normal:1500">
                </div>
                <button type="submit" id="saveBtn" class="col-span-2 bg-indigo-600 text-white p-5 rounded-2xl font-black shadow-xl hover:bg-indigo-700 transition">SAVE ITEM</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { auth, db, APP_CONFIG } from './config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { collection, onSnapshot, doc, setDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let inventory = [];
        let base64Img = "";

        onAuthStateChanged(auth, user => {
            if(user) {
                document.getElementById('authGuard').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                loadData();
            } else { window.location.href = "admin.html"; }
        });

        function loadData() {
            onSnapshot(collection(db, "products"), snap => {
                inventory = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderTable();
            });
        }

        function renderTable() {
            const list = document.getElementById('inventoryList');
            list.innerHTML = inventory.map(p => `
                <tr class="hover:bg-slate-50 transition">
                    <td class="p-10">
                        <div class="flex items-center gap-4">
                            <img src="${p.imageUrl || 'https://via.placeholder.com/60'}" class="w-12 h-12 rounded-xl object-cover">
                            <div><p class="font-black">${p.nameEn}</p><p class="text-[10px] text-slate-400 uppercase">${p.category}</p></div>
                        </div>
                    </td>
                    <td>${(p.variants || []).map(v => `<p class="text-xs">${v.weight}: Rs.${v.price}</p>`).join('')}</td>
                    <td class="font-black">${p.stock || 0}</td>
                    <td class="p-10 text-right">
                        <button onclick="editItem('${p.id}')" class="text-indigo-600 p-2"><i class="fa-solid fa-pen"></i></button>
                        <button onclick="deleteItem('${p.id}')" class="text-rose-500 p-2 ml-2"><i class="fa-solid fa-trash"></i></button>
                    </td>
                </tr>`).join('');
        }

        window.previewImage = (input) => {
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('itemPreview').src = e.target.result;
                document.getElementById('itemPreview').classList.remove('hidden');
                document.getElementById('uploadIcon').classList.add('hidden');
                base64Img = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        };

        async function uploadToImgBB(b64) {
            const fd = new FormData();
            fd.append("image", b64.split(',')[1]);
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${APP_CONFIG.imgbbKey}`, { method: 'POST', body: fd });
            const data = await res.json();
            return data.data.url;
        }

        document.getElementById('itemForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.innerText = "UPLOADING...";

            const id = document.getElementById('editId').value || doc(collection(db, "products")).id;
            let finalUrl = inventory.find(x => x.id === id)?.imageUrl || "";

            if(base64Img) finalUrl = await uploadToImgBB(base64Img);

            const vars = document.getElementById('variants').value.split(',').map(v => {
                const [w, p] = v.split(':');
                return { weight: (w || 'Unit').trim(), price: parseFloat(p) || 0 };
            });

            await setDoc(doc(db, "products", id), {
                nameEn: document.getElementById('nameEn').value,
                category: document.getElementById('category').value,
                costPrice: parseFloat(document.getElementById('cost').value),
                stock: parseFloat(document.getElementById('stock').value),
                variants: vars,
                imageUrl: finalUrl,
                lastUpdated: serverTimestamp()
            }, { merge: true });

            closeModal();
            btn.disabled = false; btn.innerText = "SAVE ITEM";
        };

        window.openModal = () => {
            document.getElementById('itemForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('itemPreview').classList.add('hidden');
            document.getElementById('uploadIcon').classList.remove('hidden');
            document.getElementById('itemModal').style.display = 'flex';
        };

        window.closeModal = () => document.getElementById('itemModal').style.display = 'none';

        window.editItem = (id) => {
            const p = inventory.find(x => x.id === id);
            document.getElementById('editId').value = p.id;
            document.getElementById('nameEn').value = p.nameEn;
            document.getElementById('category').value = p.category;
            document.getElementById('cost').value = p.costPrice;
            document.getElementById('stock').value = p.stock || 0;
            document.getElementById('variants').value = (p.variants || []).map(v => `${v.weight}:${v.price}`).join(',');
            if(p.imageUrl) {
                document.getElementById('itemPreview').src = p.imageUrl;
                document.getElementById('itemPreview').classList.remove('hidden');
                document.getElementById('uploadIcon').classList.add('hidden');
            }
            document.getElementById('itemModal').style.display = 'flex';
        };

        window.deleteItem = async (id) => {
            if(confirm("Delete this item?")) await deleteDoc(doc(db, "products", id));
        };
    </script>
</body>
</html>
