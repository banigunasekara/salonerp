<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyVeg | Practical Sourcing Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="flex flex-col md:flex-row min-h-screen">
        <main class="flex-1 p-6 md:p-12 overflow-y-auto">
            
            <img id="pdfLogo" src="" style="display:none;" />

            <div class="flex justify-between items-center mb-8">
                <a href="admin.html" class="inline-flex items-center gap-2 text-slate-500 font-bold hover:text-emerald-600 transition group">
                    <div class="w-10 h-10 bg-white shadow-sm border rounded-full flex items-center justify-center group-hover:bg-emerald-50"><i class="fa-solid fa-arrow-left text-sm"></i></div>
                    <span class="text-xs uppercase tracking-widest">Back to Dashboard</span>
                </a>
                <a href="reports.html" class="bg-slate-900 text-white px-6 py-2 rounded-xl font-bold text-xs hover:bg-emerald-600 transition shadow-md">Go to Reports Hub <i class="fa-solid fa-arrow-right ml-2"></i></a>
            </div>

            <header class="flex flex-col xl:flex-row justify-between items-start xl:items-center gap-8 mb-12">
                <div>
                    <h2 class="text-4xl font-black text-slate-900 tracking-tight">Purchase <span class="text-emerald-600">Worksheet</span></h2>
                    <p class="text-slate-500 font-bold uppercase tracking-[0.2em] text-[10px] mt-2">Smart Weight Calculation & 0.25kg Rounding</p>
                </div>
                
                <div class="flex items-center gap-3 bg-white p-3 rounded-[2rem] shadow-sm border border-slate-100">
                    <input type="date" id="pStart" class="p-2 bg-transparent outline-none font-bold text-sm text-slate-600">
                    <span class="text-slate-300 font-black pt-2">TO</span>
                    <input type="date" id="pEnd" class="p-2 bg-transparent outline-none font-bold text-sm text-slate-600">
                    <button onclick="calcPlan()" class="bg-slate-900 text-white px-8 py-3 rounded-xl font-black text-xs hover:bg-emerald-600 transition shadow-lg uppercase">Calculate Needs</button>
                </div>
            </header>

            <div class="bg-white rounded-[3rem] shadow-xl border border-slate-100 overflow-hidden mb-8">
                <div class="p-6 bg-slate-50 border-b flex justify-between items-center">
                    <h3 class="font-black text-slate-700 uppercase text-xs tracking-widest">Editable Purchasing List</h3>
                    <span class="text-[10px] font-bold text-slate-400 bg-white px-3 py-1 rounded-full border">Auto-rounds to nearest 250g (0.25kg)</span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left min-w-[900px]">
                        <thead class="bg-white text-[10px] font-black uppercase text-slate-400 border-b">
                            <tr>
                                <th class="p-6">Vegetable Item</th>
                                <th class="text-center">Net Ordered (Kg/Units)</th>
                                <th class="text-center bg-amber-50/50">Wastage % (Edit)</th>
                                <th class="text-center text-slate-300">Est. Total</th>
                                <th class="text-right p-6 bg-emerald-50/50 text-emerald-700">Final Buy Qty (Edit)</th>
                            </tr>
                        </thead>
                        <tbody id="planBody" class="text-sm font-bold divide-y divide-slate-50">
                            <tr><td colspan="5" class="p-16 text-center text-slate-400"><i class="fa-solid fa-basket-shopping text-4xl mb-3 opacity-30 block"></i> Select dates to load the worksheet.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="flex flex-wrap gap-4 justify-end">
                <button onclick="downloadPDF()" class="bg-white border-2 border-slate-200 text-slate-700 px-8 py-4 rounded-2xl font-black text-xs hover:bg-slate-50 hover:text-rose-600 transition shadow-sm flex items-center gap-3">
                    <i class="fa-solid fa-file-pdf text-rose-500 text-xl"></i> DOWNLOAD PDF LIST
                </button>
                <button onclick="shareWhatsApp()" class="bg-emerald-600 text-white px-8 py-4 rounded-2xl font-black text-xs hover:bg-emerald-500 transition shadow-lg flex items-center gap-3">
                    <i class="fa-brands fa-whatsapp text-xl"></i> SHARE TO PURCHASER
                </button>
            </div>

        </main>
    </div>

    <script type="module">
        import { db, APP_CONFIG } from './config.js';
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Pre-load Logo for PDF
        document.getElementById('pdfLogo').src = APP_CONFIG.business.logo;
        
        document.getElementById('pStart').valueAsDate = new Date();
        document.getElementById('pEnd').valueAsDate = new Date();

        let planData = [];

        window.calcPlan = async () => {
            const start = new Date(document.getElementById('pStart').value).getTime();
            const end = new Date(document.getElementById('pEnd').value).setHours(23,59,59);

            document.getElementById('planBody').innerHTML = '<tr><td colspan="5" class="p-16 text-center"><i class="fa-solid fa-spinner animate-spin text-3xl text-emerald-500"></i></td></tr>';

            try {
                const oSnap = await getDocs(collection(db, "orders"));
                const totals = {};

                oSnap.forEach(d => {
                    const o = d.data(); 
                    const ts = o.timestamp?.seconds * 1000;
                    
                    if(ts >= start && ts <= end && o.status !== 'Cancelled') {
                        (o.items || []).forEach(i => { 
                            const itemName = i.nameEn || i.name;
                            
                            // --- SMART WEIGHT PARSER (NEW FIX) ---
                            let weightStr = String(i.weight || "1").toLowerCase().trim();
                            let numValue = parseFloat(weightStr);
                            
                            // "Bundle", "Unit", "Packet" වැනි දේවල් සඳහා 1 ලෙස සලකයි
                            if(isNaN(numValue)) numValue = 1; 

                            let standardMultiplier = 1;
                            
                            // 250g, 100g ආදිය කිලෝග්‍රෑම් වලට හැරවීම (x 0.001)
                            if(weightStr.includes('g') && !weightStr.includes('kg')) {
                                standardMultiplier = 0.001; 
                            } 
                            // 500ml ආදිය ලීටර්/කිලෝ වලට හැරවීම
                            else if(weightStr.includes('ml')) {
                                standardMultiplier = 0.001;
                            }

                            // නියම බර ගණනය කිරීම: (උදා: 4 x 250 x 0.001 = 1kg)
                            const actualWeightInKg = parseFloat(i.qty) * numValue * standardMultiplier;
                            
                            totals[itemName] = (totals[itemName] || 0) + actualWeightInKg; 
                        });
                    }
                });

                // Build Editable Data Model
                planData = Object.keys(totals).map(name => {
                    const net = totals[name];
                    const wPct = 10; // Default Wastage 10%
                    const raw = net + (net * (wPct / 100));
                    
                    // Auto-round to nearest 0.25kg (250g)
                    const finalBuy = Math.ceil(raw * 4) / 4; 
                    
                    return { name, net, wPct, raw, finalBuy };
                }).sort((a,b) => a.name.localeCompare(b.name));

                renderTable();
            } catch (e) {
                console.error(e);
                alert("Error fetching orders. Check database connection.");
            }
        };

        window.renderTable = () => {
            const tbody = document.getElementById('planBody');
            if(planData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="p-16 text-center text-slate-400 font-bold uppercase tracking-widest text-xs">No orders found for this period.</td></tr>';
                return;
            }

            tbody.innerHTML = planData.map((i, idx) => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="p-6 text-slate-900 font-black">${i.name}</td>
                    
                    <td class="text-center text-slate-500">${i.net.toFixed(3)}</td>
                    
                    <td class="text-center bg-amber-50/30">
                        <div class="inline-flex items-center bg-white border border-amber-200 rounded-lg overflow-hidden focus-within:ring-2 ring-amber-400">
                            <input type="number" value="${i.wPct}" step="1" min="0"
                                onchange="updateWastage(${idx}, this.value)"
                                class="w-16 text-center font-black text-amber-700 outline-none p-2 bg-transparent">
                            <span class="text-amber-400 font-black pr-2">%</span>
                        </div>
                    </td>
                    
                    <td class="text-center text-slate-400 font-medium" id="raw-${idx}">${i.raw.toFixed(3)}</td>
                    
                    <td class="p-6 text-right bg-emerald-50/30">
                        <div class="inline-flex items-center bg-white border-2 border-emerald-300 rounded-xl overflow-hidden shadow-sm focus-within:ring-2 ring-emerald-500">
                            <input type="number" id="final-${idx}" value="${i.finalBuy.toFixed(2)}" step="0.05" min="0"
                                onchange="updateFinalQty(${idx}, this.value)"
                                class="w-24 text-right font-black text-emerald-700 text-lg outline-none p-2 bg-transparent">
                            <span class="text-emerald-500 font-bold pr-3 bg-emerald-50 p-2 border-l border-emerald-100">Kg/U</span>
                        </div>
                    </td>
                </tr>
            `).join('');
        };

        window.updateWastage = (idx, val) => {
            const pct = parseFloat(val) || 0; 
            planData[idx].wPct = pct;
            const raw = planData[idx].net + (planData[idx].net * (pct / 100));
            planData[idx].raw = raw;
            planData[idx].finalBuy = Math.ceil(raw * 4) / 4; 
            document.getElementById(`raw-${idx}`).innerText = raw.toFixed(3);
            document.getElementById(`final-${idx}`).value = planData[idx].finalBuy.toFixed(2);
        };

        window.updateFinalQty = (idx, val) => {
            planData[idx].finalBuy = parseFloat(val) || 0;
        };

        window.downloadPDF = () => {
            if(planData.length === 0) return alert("Please calculate the worksheet first.");
            const doc = new window.jspdf.jsPDF();
            
            try { doc.addImage(document.getElementById('pdfLogo'), 'PNG', 14, 10, 25, 25); } catch(e){}
            
            doc.setFontSize(20); doc.setTextColor(15,23,42);
            doc.text("MARKET PURCHASE LIST", 45, 22);
            doc.setFontSize(10); doc.setTextColor(100);
            doc.text(`Required Date: ${document.getElementById('pEnd').value}`, 45, 28);

            doc.autoTable({
                startY: 40,
                head: [['#', 'Vegetable Item', 'Quantity to Buy']],
                body: planData.map((i, idx) => [idx + 1, i.name, `${i.finalBuy.toFixed(2)}`]),
                theme: 'grid',
                headStyles: { fillColor: [5,150,105], fontSize: 12 },
                bodyStyles: { fontSize: 11, fontStyle: 'bold' },
                columnStyles: { 2: { halign: 'right', textColor: [15,23,42] } }
            });
            
            doc.save(`Market_List_${document.getElementById('pEnd').value}.pdf`);
        };

        window.shareWhatsApp = () => {
            if(planData.length === 0) return alert("Worksheet is empty.");
            let msg = `*🛒 MARKET PURCHASE LIST*\n`;
            msg += `Date: ${document.getElementById('pEnd').value}\n\n`;
            
            planData.forEach(i => {
                msg += `👉 *${i.name}*: Buy *${i.finalBuy.toFixed(2)}*\n`;
            });
            
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
        };
    </script>
</body>
</html>
