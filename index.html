<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon Unix | Premium Grooming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .hero-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); }
        /* සෙලෙක්ට් බොක්ස් එක හොඳින් පෙනීමට */
        select option { background: white; color: black; padding: 10px; }
        .drawer-open { transform: translateX(0) !important; }
    </style>
</head>
<body class="bg-slate-50">

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-[100] bg-white/90 backdrop-blur-md border-b">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img id="navLogo" src="https://via.placeholder.com/50x50?text=Logo" alt="Logo" class="h-10 w-10 object-contain rounded-lg">
                <h1 class="text-2xl font-black italic tracking-tighter text-slate-900">SALON <span class="text-indigo-600">UNIX</span></h1>
            </div>
            <button onclick="toggleCart()" class="relative p-3 bg-slate-900 text-white rounded-2xl hover:scale-110 transition shadow-lg">
                <i class="fa-solid fa-calendar-plus text-xl"></i>
                <span id="cartCount" class="absolute -top-1 -right-1 bg-indigo-500 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
            </button>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="pt-32 px-6 max-w-7xl mx-auto mb-16">
        <div class="hero-gradient rounded-[3rem] p-12 md:p-20 relative overflow-hidden shadow-2xl">
            <div class="relative z-10 max-w-2xl">
                <div class="flex items-center gap-4 mb-6">
                    <img id="heroLogo" src="https://via.placeholder.com/80x80?text=Logo" alt="Logo" class="h-16 w-16 object-contain bg-white/10 p-2 rounded-2xl backdrop-blur-md">
                    <span class="text-indigo-400 font-black uppercase tracking-[0.4em] text-xs">Unisex Salon & Spa</span>
                </div>
                <h2 class="text-5xl md:text-7xl font-black text-white mt-4 mb-6 leading-tight">Elite Care for the Modern <span class="text-indigo-500">Soul.</span></h2>
                <p class="text-slate-400 text-lg mb-10 leading-relaxed">Premium services from Maradana's finest stylists. Experience luxury grooming.</p>
                <div class="flex flex-wrap gap-4">
                    <a href="#services" class="bg-indigo-600 text-white px-10 py-5 rounded-2xl font-black shadow-xl hover:bg-indigo-500 transition uppercase tracking-widest text-sm">Book Service</a>
                    <a href="#products" class="bg-white/10 text-white px-10 py-5 rounded-2xl font-black hover:bg-white/20 transition uppercase tracking-widest text-sm">Buy Products</a>
                </div>
            </div>
            <div class="absolute right-0 top-0 bottom-0 w-1/3 bg-gradient-to-l from-indigo-500/10 to-transparent hidden lg:block"></div>
        </div>
    </header>

    <!-- Staff Section -->
    <section class="max-w-7xl mx-auto px-6 mb-24">
        <div class="flex items-center justify-between mb-12">
            <h3 class="text-3xl font-black text-slate-900 italic">Our <span class="text-indigo-600">Specialists</span></h3>
            <div class="h-1 flex-1 mx-8 bg-slate-100 hidden md:block"></div>
        </div>
        <div id="staffShowcase" class="flex gap-6 overflow-x-auto pb-6 no-scrollbar"></div>
    </section>

    <!-- Services Grid -->
    <section id="services" class="max-w-7xl mx-auto px-6 mb-24">
        <h3 class="text-3xl font-black text-slate-900 mb-12 italic">Signature <span class="text-indigo-600">Services</span></h3>
        <div id="serviceGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
    </section>

    <!-- Products Grid -->
    <section id="products" class="max-w-7xl mx-auto px-6 mb-24">
        <h3 class="text-3xl font-black text-slate-900 mb-12 italic">Luxury <span class="text-emerald-600">Retail</span></h3>
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
    </section>

    <!-- Booking Drawer -->
    <div id="cartDrawer" class="fixed inset-y-0 right-0 w-full max-w-md bg-white shadow-2xl z-[200] transform translate-x-full transition-transform duration-500 flex flex-col">
        <div class="p-8 bg-slate-900 text-white flex justify-between items-center">
            <h3 class="text-xl font-black uppercase tracking-widest italic">Booking Summary</h3>
            <button onclick="toggleCart()" class="text-3xl"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="cartItems" class="flex-grow p-6 space-y-4 overflow-y-auto"></div>
        
        <div class="p-8 border-t bg-slate-50 space-y-4">
            <input type="text" id="custName" placeholder="Customer Name" class="w-full p-4 rounded-xl border-2 border-slate-200 outline-none font-bold focus:border-indigo-500">
            <input type="tel" id="custPhone" placeholder="WhatsApp Number" class="w-full p-4 rounded-xl border-2 border-slate-200 outline-none font-bold focus:border-indigo-500">
            
            <div class="space-y-2">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Choose Stylist & Time</p>
                <select id="selStaff" class="w-full p-4 rounded-xl border-2 border-slate-200 font-bold text-sm outline-none focus:border-indigo-500 cursor-pointer">
                    <option value="">Select Stylist</option>
                </select>
                <input type="datetime-local" id="bookDate" class="w-full p-4 rounded-xl border-2 border-slate-200 font-bold text-sm outline-none focus:border-indigo-500 cursor-pointer">
            </div>

            <div class="flex justify-between items-center py-4 border-t border-dashed">
                <span class="font-black text-slate-500">Total Due</span>
                <span id="cartTotal" class="text-3xl font-black text-slate-900">Rs. 0</span>
            </div>
            <button onclick="checkout()" id="bookBtn" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black shadow-xl hover:bg-indigo-700 transition uppercase tracking-widest">Confirm Appointment</button>
        </div>
    </div>

    <script type="module">
        import { db, APP_CONFIG } from './config.js';
        import { collection, onSnapshot, addDoc, serverTimestamp, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let allItems = [];
        let cart = [];
        let staffList = [];

        window.onload = () => {
            const logo = APP_CONFIG.business.logo;
            // GitHub/Vercel වල images පවතිනවාද කියා පරීක්ෂා කර fallback දීම
            document.getElementById('navLogo').src = logo || 'https://via.placeholder.com/50x50?text=Logo';
            document.getElementById('heroLogo').src = logo || 'https://via.placeholder.com/80x80?text=Logo';
        };

        // Real-time Staff Loading
        onSnapshot(collection(db, "staff"), snap => {
            staffList = snap.docs.map(d => ({id: d.id, ...d.data()}));
            const select = document.getElementById('selStaff');
            const showcase = document.getElementById('staffShowcase');
            
            const activeStaff = staffList.filter(s => s.status === 'Active');
            
            select.innerHTML = '<option value="">Any Specialist</option>' + 
                activeStaff.map(s => `<option value="${s.id}">${s.name} (${s.role})</option>`).join('');

            showcase.innerHTML = activeStaff.map(s => `
                <div class="flex-shrink-0 w-48 bg-white p-6 rounded-[2.5rem] border text-center shadow-sm">
                    <img src="${s.photo || 'https://via.placeholder.com/150'}" class="w-24 h-24 rounded-2xl mx-auto mb-3 object-cover shadow-lg">
                    <h5 class="font-black text-slate-900 text-sm">${s.name}</h5>
                    <p class="text-[9px] font-black text-indigo-600 uppercase mt-1">${s.role}</p>
                </div>
            `).join('');
        });

        onSnapshot(collection(db, "products"), snap => {
            allItems = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderUI();
        });

        function renderUI() {
            const servGrid = document.getElementById('serviceGrid');
            const prodGrid = document.getElementById('productGrid');
            const services = allItems.filter(i => i.category !== 'Products');
            const products = allItems.filter(i => i.category === 'Products');

            servGrid.innerHTML = services.map(i => `
                <div class="bg-white p-6 rounded-[2rem] border hover:shadow-2xl transition group cursor-pointer" onclick="addToCart('${i.id}')">
                    <div class="h-32 bg-slate-50 rounded-2xl mb-4 overflow-hidden">
                        <img src="${i.imageUrl || 'https://via.placeholder.com/300'}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                    </div>
                    <h4 class="font-black text-slate-900">${i.nameEn}</h4>
                    <p class="text-indigo-600 font-bold text-sm">Rs. ${i.variants?.[0]?.price || 0}</p>
                </div>
            `).join('');

            prodGrid.innerHTML = products.map(i => `
                <div class="bg-white p-4 rounded-[1.5rem] border hover:shadow-lg transition cursor-pointer" onclick="addToCart('${i.id}')">
                    <img src="${i.imageUrl || 'https://via.placeholder.com/200'}" class="w-full aspect-square rounded-xl mb-2 object-cover">
                    <h5 class="text-xs font-black text-slate-800 truncate">${i.nameEn}</h5>
                    <p class="text-emerald-600 font-bold text-xs mt-1">Rs. ${i.variants?.[0]?.price || 0}</p>
                </div>
            `).join('');
        }

        window.addToCart = (id) => {
            const item = allItems.find(x => x.id === id);
            const variant = item.variants?.[0] || { price: 0 };
            const existing = cart.find(x => x.id === id);
            if(existing) existing.qty++;
            else cart.push({ id: item.id, name: item.nameEn, price: variant.price, qty: 1, type: item.category === 'Products' ? 'Product' : 'Service' });
            updateCart();
            document.getElementById('cartDrawer').classList.add('translate-x-0');
        };

        function updateCart() {
            const count = cart.reduce((s, i) => s + i.qty, 0);
            document.getElementById('cartCount').innerText = count;
            let total = 0;
            document.getElementById('cartItems').innerHTML = cart.map((i, idx) => {
                total += i.price * i.qty;
                return `
                    <div class="flex justify-between items-center bg-slate-50 p-4 rounded-xl border">
                        <div><p class="font-black text-xs">${i.name}</p><p class="text-[9px] text-slate-400">Rs. ${i.price} x ${i.qty}</p></div>
                        <button onclick="changeQty(${idx}, -1)" class="text-rose-500 px-2"><i class="fa-solid fa-trash-can"></i></button>
                    </div>`;
            }).join('');
            document.getElementById('cartTotal').innerText = `Rs. ${total.toLocaleString()}`;
        }

        window.changeQty = (idx, d) => {
            cart[idx].qty += d;
            if(cart[idx].qty <= 0) cart.splice(idx, 1);
            updateCart();
        };

        window.toggleCart = () => document.getElementById('cartDrawer').classList.toggle('translate-x-full');

        window.checkout = async () => {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const date = document.getElementById('bookDate').value;
            const staffId = document.getElementById('selStaff').value;
            if(!name || !phone || cart.length === 0) return alert("Please fill all details.");
            
            const btn = document.getElementById('bookBtn');
            btn.disabled = true; btn.innerText = "PROCESSING...";
            
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const staff = staffList.find(x => x.id === staffId);

            try {
                await addDoc(collection(db, "orders"), {
                    customerName: name, customerPhone: phone,
                    date: date ? date.split('T')[0] : 'N/A',
                    time: date ? date.split('T')[1] : 'N/A',
                    staffName: staff ? staff.name : 'Unassigned',
                    items: cart, total: total, status: 'Confirmed', timestamp: serverTimestamp()
                });

                let msg = `*SALON UNIX - BOOKING*%0A*Client:* ${name}%0A*Phone:* ${phone}%0A*Total:* Rs.${total}`;
                window.open(`https://wa.me/${APP_CONFIG.business.whatsapp}?text=${msg}`);
                cart = []; updateCart(); toggleCart();
                alert("Appointment Confirmed!");
            } catch(e) { alert("Failed: " + e.message); }
            finally { btn.disabled = false; btn.innerText = "Confirm Appointment"; }
        };
    </script>
</body>
</html>
